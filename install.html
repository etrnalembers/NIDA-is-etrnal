<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html,
    body,
    div {
      margin: 0;
      padding: 0;
      font: normal 16px/24px Helvetica Neue, Helvetica, sans-serif;
      color: #333;
    }

    #main {
      max-width: 630px;
      margin: 3em auto;
    }

    .bookmarklet {
      display: inline-block;
      padding: .5em 1em;
      color: #fff;
      background: #50dcf3;
      border-radius: 4px;
      text-decoration: none;
    }

    a {
      color: #50dcf3;
    }

    .dim {
      color: #999;
    }
  </style>
</head>

<body>
  <div id="main">
    <h1>Mr. DecodeSeeks</h1>
    <p>
      Drag this button to your bookmarks bar to save it as a bookmarklet:
    </p>
    <p>
      <a class="bookmarklet"
        href="javascript:(function()%7Btry%7Bconst%20frame=window.frames%5B'IframeLesson'%5D.contentWindow;if(!frame)throw%20new%20Error(%22Could%20not%20find%20IframeLesson%22);let%20cookie=frame.Nida.Cookies.get(%22assessment%22);if(!cookie)throw%20new%20Error(%22Could%20not%20find%20assessment%20cookie%22);function%20decode(e)%7Blet%20part=e.split(%22$$%22).find(e=%3Ee.startsWith(%22pull:%22));if(!part)throw%20new%20Error(%22No%20pull%20section%20found%20in%20cookie%22);return%20part.split(%22:%22)%5B1%5D.split(%22,%22).map((e,t)=%3E%7Blet%20s=parseInt(e.substr(e.length-3,3),10)-13-t;return%20String.fromCharCode(s)%7D).join(%22%22)%7Dlet%20res=decode(cookie);console.log(%22Decoded:%22,res);prompt(%22Decoded%20Answer%20Key%20Created:%22,res)%7Dcatch(err)%7Balert(%22Bookmarklet%20Error:%20%22+err.message)%7D%7D)()">Open
        My Mind</a>
    </p>

    <p class="dim">Assisted by <a href="https://github.com/mrcoles/bookmarklet">bookmarklet</a> npm library!</p>
  </div>
</body>

</html>
